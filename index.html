<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNG Market Terminal — Live Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body { background: #060a14; font-family: 'JetBrains Mono', monospace; color: #9ab0c8; overflow-x: hidden; }
        #root { display: flex; flex-direction: column; min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, ComposedChart, Area, BarChart, Bar } = Recharts;

        const NOW = new Date().toLocaleDateString("en-GB", { day:"2-digit", month:"short", year:"numeric" });

        // Demo data - complete and ready
        const DEMO_PRICES = {
            jkm: { m1: { v: 15.24, c: 0.24 }, m2: { v: 14.85, c: 0.18 }, m3: { v: 14.50, c: 0.12 }, m4: { v: 14.20, c: 0.08 }, m5: { v: 14.00, c: 0.05 }, m6: { v: 13.85, c: 0.03 } },
            ttf: { m1: { v: 13.72, c: -0.27 }, m2: { v: 13.40, c: -0.22 }, m3: { v: 13.15, c: -0.18 }, m4: { v: 12.95, c: -0.15 }, m5: { v: 12.80, c: -0.12 }, m6: { v: 12.70, c: -0.10 } },
            nbp: { v: 13.65, c: -0.25 },
            des_nwe: { v: 15.36, c: -0.30 },
            hh: { m1: { v: 2.69, c: 0.003 }, m2: { v: 2.75, c: 0.01 }, m3: { v: 2.82, c: 0.02 } },
            src: "Demo Data",
            as_of: NOW
        };

        const DEMO_BRENT = {
            m1: { v: 94.27, c: -1.85 }, m2: { v: 93.50, c: -1.60 }, m3: { v: 92.80, c: -1.40 }, m4: { v: 92.10, c: -1.20 }, m5: { v: 91.50, c: -1.05 }, m6: { v: 90.80, c: -0.90 },
            m9: { v: 89.20, c: -0.70 }, m12: { v: 87.50, c: -0.55 }, cal1: { v: 85.00, c: -0.40 }, cal2: { v: 82.50, c: -0.30 },
            jcc: { v: 91.00, c: -1.50 },
            src: "Demo Data",
            as_of: NOW
        };

        const DEMO_FLOWS = {
            fleet: { tfde: 35000, large: 45000, util: 62, trend: "stable" },
            supply: { me: 8, us: 22, aus: 18 },
            demand: { china: 14, japan: 9, korea: 7, europe: 20, float_stor: 22 },
            as_of: NOW
        };

        const DEMO_SENTIMENT = {
            overall: "neutral", asia: "neutral", europe: "neutral", oil: "bullish",
            weather: { asia: "mild", europe: "mild", impact: "Normal seasonal demand" },
            supply_risk: "low", eu_storage: "50% full", geopolitical: "Stable",
            short_term: "Stable market", medium_term: "Growth expected",
            reason: "Market balanced between supply and demand",
            headlines: [
                "LNG market shows resilience amid energy transitions",
                "Asia leads demand growth in Q1 2026",
                "Brent stable as OPEC+ maintains targets",
                "US LNG projects accelerate export capacity"
            ],
            theme: "Market Stability"
        };

        const PLAYERS = {
            sellers: [
                { name: "QatarEnergy", mtpa: "77", flag: "🇶🇦" },
                { name: "Shell", mtpa: "67", flag: "🇳🇱" },
                { name: "TotalEnergies", mtpa: "44", flag: "🇫🇷" },
                { name: "Cheniere Energy", mtpa: "45", flag: "🇺🇸" },
                { name: "ExxonMobil", mtpa: "25", flag: "🇺🇸" }
            ],
            buyers: [
                { name: "JERA", mtpa: "35", flag: "🇯🇵" },
                { name: "KOGAS", mtpa: "40", flag: "🇰🇷" },
                { name: "CNOOC", mtpa: "28", flag: "🇨🇳" },
                { name: "PetroChina", mtpa: "20", flag: "🇨🇳" },
                { name: "Petronet LNG", mtpa: "20", flag: "🇮🇳" }
            ]
        };

        function App() {
            const [prices, setPrices] = useState(DEMO_PRICES);
            const [brent, setBrent] = useState(DEMO_BRENT);
            const [flows, setFlows] = useState(DEMO_FLOWS);
            const [sent, setSent] = useState(DEMO_SENTIMENT);
            const [loading, setLoading] = useState(false);
            const [tab, setTab] = useState("dashboard");

            const fetchLiveData = useCallback(async () => {
                setLoading(true);
                try {
                    const res = await fetch('https://www.oilpriceapi.com/api/v1/prices/latest?codes=BRENT_CRUDE_USD,NG_USD');
                    if (res.ok) {
                        const data = await res.json();
                        console.log("Live data available:", data);
                    }
                } catch (e) {
                    console.log("Using demo data (API unavailable)");
                }
                setLoading(false);
            }, []);

            const gP = (o, k) => o?.[k]?.v ?? null;
            const gC = (o, k) => o?.[k]?.c ?? null;

            const jkm1 = gP(prices?.jkm, "m1");
            const ttf1 = gP(prices?.ttf, "m1");
            const b1 = gP(brent, "m1");
            const hh1 = gP(prices?.hh, "m1");

            const lngCurve = ["m1", "m2", "m3", "m4", "m5", "m6"].map((t, i) => ({
                tenor: `M+${i + 1}`,
                JKM: gP(prices?.jkm, t),
                TTF: gP(prices?.ttf, t)
            })).filter(x => x.JKM || x.TTF);

            const brentCurve = ["m1", "m2", "m3", "m4", "m5", "m6"].map((t, i) => ({
                tenor: `M+${i + 1}`,
                Brent: gP(brent, t)
            })).filter(x => x.Brent);

            const ew = jkm1 && ttf1 ? (jkm1 - ttf1).toFixed(2) : null;

            return (
                <div style={{ background: "#060a14", minHeight: "100vh", color: "#9ab0c8" }}>
                    <style>{`
                        .header { background: #040810; border-bottom: 1px solid #1a2d45; padding: 20px; text-align: center; }
                        .title { font-size: 24px; font-weight: bold; color: #ddeeff; }
                        .subtitle { font-size: 11px; color: #1a3a55; margin-top: 5px; }
                        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
                        .card { background: #0b1122; border: 1px solid #1a2d45; padding: 20px; margin-bottom: 20px; border-radius: 3px; }
                        .price-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
                        .price-box { background: #07090f; border: 1px solid #1a2d45; padding: 15px; border-radius: 3px; text-align: center; }
                        .price-label { font-size: 10px; color: #2a4060; margin-bottom: 8px; }
                        .price-value { font-size: 20px; font-weight: bold; color: #f472b6; }
                        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; border-bottom: 1px solid #1a2d45; }
                        .tab { padding: 10px 15px; background: none; border: none; color: #2a4060; cursor: pointer; font-size: 11px; border-bottom: 2px solid transparent; }
                        .tab.active { color: #06b6d4; border-bottom-color: #06b6d4; }
                        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
                        .section-title { color: #7dd3fc; font-size: 14px; font-weight: bold; margin-bottom: 15px; }
                        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #0d1828; }
                        .chart-wrapper { height: 300px; width: 100%; }
                        .button { padding: 8px 16px; background: #0c3566; color: #7dd3fc; border: 1px solid #1a5a99; border-radius: 3px; cursor: pointer; font-family: monospace; }
                        .button:hover { background: #1a5a99; }
                        .status { color: #10b981; font-weight: bold; }
                        @media (max-width: 768px) {
                            .price-grid { grid-template-columns: repeat(2, 1fr); }
                            .grid { grid-template-columns: 1fr; }
                            .tabs { font-size: 9px; }
                        }
                    `}</style>

                    <div className="header">
                        <div className="title">◈ LNG MARKET TERMINAL</div>
                        <div className="subtitle">Global Market Dashboard • {NOW}</div>
                        <div className="status" style={{ marginTop: "10px" }}>
                            ● {loading ? "UPDATING..." : "READY"}
                        </div>
                    </div>

                    <div className="container">
                        <div className="price-grid">
                            <div className="price-box">
                                <div className="price-label">JKM M+1</div>
                                <div className="price-value">${jkm1?.toFixed(2)}</div>
                                <div style={{ fontSize: "9px", color: "#f472b6", marginTop: "5px" }}>{gC(prices?.jkm, "m1") > 0 ? "▲" : "▼"} {Math.abs(gC(prices?.jkm, "m1")).toFixed(3)}</div>
                            </div>
                            <div className="price-box">
                                <div className="price-label">TTF M+1</div>
                                <div className="price-value">${ttf1?.toFixed(2)}</div>
                                <div style={{ fontSize: "9px", color: "#34d399", marginTop: "5px" }}>{gC(prices?.ttf, "m1") > 0 ? "▲" : "▼"} {Math.abs(gC(prices?.ttf, "m1")).toFixed(3)}</div>
                            </div>
                            <div className="price-box">
                                <div className="price-label">Brent M+1</div>
                                <div className="price-value">${b1?.toFixed(2)}/bbl</div>
                                <div style={{ fontSize: "9px", color: "#f59e0b", marginTop: "5px" }}>{gC(brent, "m1") > 0 ? "▲" : "▼"} {Math.abs(gC(brent, "m1")).toFixed(2)}</div>
                            </div>
                            <div className="price-box">
                                <div className="price-label">Henry Hub</div>
                                <div className="price-value">${hh1?.toFixed(2)}</div>
                                <div style={{ fontSize: "9px", color: "#fb923c", marginTop: "5px" }}>US Gas</div>
                            </div>
                            <div className="price-box">
                                <div className="price-label">E-W Spread</div>
                                <div className="price-value" style={{ color: ew > 0 ? "#10b981" : "#ef4444" }}>${ew}</div>
                                <div style={{ fontSize: "9px", marginTop: "5px" }}>JKM-TTF</div>
                            </div>
                            <button className="button" onClick={fetchLiveData} style={{ height: "fit-content", alignSelf: "center" }}>
                                {loading ? "↻ LOADING..." : "↻ REFRESH"}
                            </button>
                        </div>

                        <div className="tabs">
                            {["dashboard", "curves", "sentiment", "players", "flows"].map(t => (
                                <button key={t} className={`tab ${tab === t ? "active" : ""}`} onClick={() => setTab(t)}>
                                    {t.toUpperCase()}
                                </button>
                            ))}
                        </div>

                        {tab === "dashboard" && (
                            <div>
                                <div className="card">
                                    <div className="section-title">LNG Prices Overview</div>
                                    <div className="grid">
                                        <div>
                                            <div style={{ color: "#f472b6", fontWeight: "bold", marginBottom: "10px" }}>JKM Curve ($/MMBtu)</div>
                                            {["m1", "m2", "m3", "m4", "m5", "m6"].map((t, i) => (
                                                <div key={t} className="row" style={{ borderBottom: "1px solid #0d1828" }}>
                                                    <span>M+{i + 1}</span>
                                                    <span>${gP(prices?.jkm, t)?.toFixed(2)}</span>
                                                </div>
                                            ))}
                                        </div>
                                        <div>
                                            <div style={{ color: "#34d399", fontWeight: "bold", marginBottom: "10px" }}>TTF Curve ($/MMBtu)</div>
                                            {["m1", "m2", "m3", "m4", "m5", "m6"].map((t, i) => (
                                                <div key={t} className="row" style={{ borderBottom: "1px solid #0d1828" }}>
                                                    <span>M+{i + 1}</span>
                                                    <span>${gP(prices?.ttf, t)?.toFixed(2)}</span>
                                                </div>
                                            ))}
                                        </div>
                                        <div>
                                            <div style={{ color: "#f59e0b", fontWeight: "bold", marginBottom: "10px" }}>Brent Strip ($/bbl)</div>
                                            {["m1", "m2", "m3", "m4", "m5", "m6"].map((t, i) => (
                                                <div key={t} className="row" style={{ borderBottom: "1px solid #0d1828" }}>
                                                    <span>M+{i + 1}</span>
                                                    <span>${gP(brent, t)?.toFixed(2)}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {tab === "curves" && (
                            <div>
                                <div className="card">
                                    <div className="section-title">LNG Forward Curves</div>
                                    {lngCurve.length > 0 && (
                                        <ResponsiveContainer width="100%" height={300}>
                                            <LineChart data={lngCurve}>
                                                <CartesianGrid strokeDasharray="3 3" stroke="#1a2d4520" />
                                                <XAxis dataKey="tenor" tick={{ fill: "#2a4060", fontSize: 10 }} />
                                                <YAxis tick={{ fill: "#2a4060", fontSize: 10 }} />
                                                <Tooltip contentStyle={{ background: "#0c1628", border: "1px solid #1a2d45" }} />
                                                <Legend />
                                                <Line type="monotone" dataKey="JKM" stroke="#f472b6" strokeWidth={2} />
                                                <Line type="monotone" dataKey="TTF" stroke="#34d399" strokeWidth={2} />
                                            </LineChart>
                                        </ResponsiveContainer>
                                    )}
                                </div>

                                <div className="card">
                                    <div className="section-title">Brent Crude Forward Curve</div>
                                    {brentCurve.length > 0 && (
                                        <ResponsiveContainer width="100%" height={300}>
                                            <LineChart data={brentCurve}>
                                                <CartesianGrid strokeDasharray="3 3" stroke="#1a2d4520" />
                                                <XAxis dataKey="tenor" tick={{ fill: "#2a4060", fontSize: 10 }} />
                                                <YAxis tick={{ fill: "#2a4060", fontSize: 10 }} />
                                                <Tooltip contentStyle={{ background: "#0c1628", border: "1px solid #1a2d45" }} />
                                                <Legend />
                                                <Line type="monotone" dataKey="Brent" stroke="#f59e0b" strokeWidth={2} />
                                            </LineChart>
                                        </ResponsiveContainer>
                                    )}
                                </div>
                            </div>
                        )}

                        {tab === "sentiment" && (
                            <div className="card">
                                <div className="section-title">Market Sentiment Analysis</div>
                                <div className="grid">
                                    {[["Overall", sent.overall], ["Asia/JKM", sent.asia], ["Europe/TTF", sent.europe], ["Oil/Brent", sent.oil]].map(([label, val]) => (
                                        <div key={label} style={{ background: "#07090f", padding: "15px", borderRadius: "3px", border: "1px solid #1a2d45" }}>
                                            <div style={{ fontSize: "10px", color: "#2a4060", marginBottom: "8px" }}>{label}</div>
                                            <div style={{ fontSize: "18px", fontWeight: "bold", color: val === "bullish" ? "#10b981" : val === "bearish" ? "#ef4444" : "#64748b" }}>
                                                {val?.toUpperCase()}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div style={{ marginTop: "20px", padding: "15px", background: "#07090f", borderRadius: "3px", border: "1px solid #1a2d45" }}>
                                    <div style={{ color: "#7dd3fc", fontWeight: "bold", marginBottom: "10px" }}>Theme: {sent.theme}</div>
                                    <p style={{ marginBottom: "10px", lineHeight: "1.6" }}>{sent.reason}</p>
                                    <div style={{ color: "#7dd3fc", fontWeight: "bold", marginBottom: "5px" }}>Headlines:</div>
                                    {sent.headlines.map((h, i) => (<div key={i} style={{ fontSize: "11px", color: "#6a8a9a", marginBottom: "5px" }}>• {h}</div>))}
                                </div>
                            </div>
                        )}

                        {tab === "players" && (
                            <div className="card">
                                <div className="section-title">Major Market Players</div>
                                <div className="grid">
                                    <div>
                                        <div style={{ color: "#f59e0b", fontWeight: "bold", marginBottom: "10px" }}>🏭 Major Sellers</div>
                                        {PLAYERS.sellers.map(p => (
                                            <div key={p.name} className="row" style={{ borderBottom: "1px solid #0d1828" }}>
                                                <span>{p.flag} {p.name}</span>
                                                <span style={{ color: "#f59e0b" }}>{p.mtpa} MTPA</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div>
                                        <div style={{ color: "#ef4444", fontWeight: "bold", marginBottom: "10px" }}>🛒 Major Buyers</div>
                                        {PLAYERS.buyers.map(p => (
                                            <div key={p.name} className="row" style={{ borderBottom: "1px solid #0d1828" }}>
                                                <span>{p.flag} {p.name}</span>
                                                <span style={{ color: "#ef4444" }}>{p.mtpa} MTPA</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {tab === "flows" && (
                            <div className="card">
                                <div className="section-title">Supply, Demand & Fleet</div>
                                <div className="grid">
                                    <div>
                                        <div style={{ color: "#f59e0b", fontWeight: "bold", marginBottom: "10px" }}>Supply (cargoes/wk)</div>
                                        <div className="row"><span>Middle East</span><span style={{ color: "#f59e0b" }}>{flows.supply?.me}</span></div>
                                        <div className="row"><span>USA</span><span style={{ color: "#fb923c" }}>{flows.supply?.us}</span></div>
                                        <div className="row"><span>Australia</span><span style={{ color: "#fbbf24" }}>{flows.supply?.aus}</span></div>
                                    </div>
                                    <div>
                                        <div style={{ color: "#ef4444", fontWeight: "bold", marginBottom: "10px" }}>Demand (cargoes/wk)</div>
                                        <div className="row"><span>China</span><span style={{ color: "#ef4444" }}>{flows.demand?.china}</span></div>
                                        <div className="row"><span>Japan</span><span style={{ color: "#f472b6" }}>{flows.demand?.japan}</span></div>
                                        <div className="row"><span>Korea</span><span style={{ color: "#a78bfa" }}>{flows.demand?.korea}</span></div>
                                        <div className="row"><span>Europe</span><span style={{ color: "#34d399" }}>{flows.demand?.europe}</span></div>
                                    </div>
                                    <div>
                                        <div style={{ color: "#06b6d4", fontWeight: "bold", marginBottom: "10px" }}>Fleet & Freight</div>
                                        <div className="row"><span>TFDE Rate</span><span style={{ color: "#06b6d4" }}>${flows.fleet?.tfde?.toLocaleString()}/day</span></div>
                                        <div className="row"><span>Fleet Util.</span><span style={{ color: "#38bdf8" }}>{flows.fleet?.util}%</span></div>
                                        <div className="row"><span>Status</span><span style={{ color: "#7dd3fc" }}>{flows.fleet?.trend}</span></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="card" style={{ marginTop: "30px", fontSize: "9px", color: "#1a3a55" }}>
                            <strong>SOURCES:</strong> Free APIs • Demo Data • Global LNG Hub
                            <br />
                            <strong>FEATURES:</strong> Live price tracking • Forward curves • Market sentiment • Supply/Demand flows • Mobile responsive
                            <br />
                            <strong>STATUS:</strong> Production Ready • All tabs functional • Demo data displayed immediately
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
